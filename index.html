<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Guess Game</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background-color: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        text-align: center;
        width: 90%;
        max-width: 500px;
        border: 3px solid #4a90e2;
      }

      .instruction {
        font-size: 24px;
        color: #2c3e50;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }

      .word-display {
        font-family: "Georgia", serif;
        font-size: 32px;
        font-weight: bold;
        color: #fd2968;
        margin: 25px 0;
        letter-spacing: 3px;
        background-color: #ecf0f1;
        padding: 15px;
        border-radius: 10px;
        border-left: 5px solid #3498db;
      }

      #guess-input {
        padding: 12px;
        font-size: 16px;
        border: 2px solid #3498db;
        border-radius: 8px;
        outline: none;
        width: 70%;
        margin-bottom: 25px;
        transition: border-color 0.3s;
      }

      #guess-input:focus {
        border-color: #e74c3c;
        transform: scale(1.02);
      }

      .btn-group {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
      }

      button {
        background-color: #3498db;
        color: white;
        padding: 12px 25px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        min-width: 120px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      button:hover {
        background-color: #2980b9;
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 6px 10px rgba(0, 0, 0, 0.2);
      }

      button:active {
        transform: translateY(1px);
      }

      #result-div {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        min-height: 28px;
      }

      #reward-image {
        display: none;
        margin: 20px auto;
        max-width: 80%;
        border-radius: 15px;
        border: 5px solid #ecf0f1;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        transition: transform 0.5s;
      }

      #reward-image:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="instruction">Try to guess the word!</div>

      <div class="word-display" id="guess-word">
        Click the "New Word" button to start!
      </div>

      <input
        id="guess-input"
        type="guess"
        placeholder="Enter your guess here"
      />

      <div class="btn-group">
        <button id="check-answer">Check Answer</button>
        <button id="new-word">New Word</button>
      </div>

      <div id="result-div"></div>
      <img
        id="reward-image"
        src=""
        alt="Reward"
        style="
          display: none;
          margin: 20px auto;
          max-width: 300px;
          border-radius: 10px;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        "
      />
    </div>

    <script>
      const wordDisplay = document.getElementById("guess-word");
      const guessInput = document.getElementById("guess-input");
      const checkButton = document.getElementById("check-answer");
      const newWordButton = document.getElementById("new-word");
      const resultDiv = document.getElementById("result-div");
      const rewardImage = document.getElementById("reward-image");

      const words = [
        "Idol",
        "Penguin",
        "Banana",
        "Shrimp",
        "Bank",
        "Boss",
        "Boomer",
        "Dragon",
        "Joker",
      ];

      const images = [
        "assets/idol.png",
        "assets/penguin.png",
        "assets/banana.png",
        "assets/shrimp.png",
        "assets/bank.png",
        "assets/Boss.png",
        "assets/boomer.png",
        "assets/dragon.png",
        "assets/joker.png",
      ];

      function getRandomWord() {
        const randomIndex = Math.floor(Math.random() * words.length);
        currentImage = images[randomIndex];
        return words[randomIndex];
      }

      function scrambleWord(word) {
        let array = word.split("");
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array.join("");
      }

      function checkAswer() {
        if (guessInput.value.toLowerCase() === currentWord.toLowerCase()) {
          resultDiv.innerText = "Correct! The word is " + currentWord;
          rewardImage.src = currentImage;
          rewardImage.style.display = "block";
        } else {
          resultDiv.innerText = "Wrong! Try again.";
          rewardImage.src =
            "assets/e09727dfe76aa0047739eeeb84681c431636744708.gif";
          rewardImage.style.display = "block";
        }
      }

      let currentWord = "";
      let currentImage = "";

      checkButton.addEventListener("click", checkAswer);
      newWordButton.addEventListener("click", () => {
        currentWord = getRandomWord();
        wordDisplay.textContent = scrambleWord(currentWord);
        guessInput.value = "";
        rewardImage.style.display = "none";
        resultDiv.innerText = "";
      });
    </script>
  </body>
</html>
